name: Build raylib ANGLE Direct3D11 for raylib-cs

on:
  workflow_dispatch:
    inputs:
      raylib_ref:
        description: "raylib git ref/tag to build"
        required: false
        default: "6.0"
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build Windows x64 ANGLE raylib.dll and C# sample
    runs-on: windows-2025

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_INSTALLATION_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Validate repository files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($path in @(
            ".github/workflows/build-raylib-angle.yml",
            "scripts/build_raylib_angle.py",
            "scripts/verify_angle_raylib.py",
            "src/RaylibAngleSample/RaylibAngleSample.csproj"
          )) {
            if (-not (Test-Path $path)) { throw "Missing required file: $path" }
          }
          python -m py_compile scripts/build_raylib_angle.py scripts/verify_angle_raylib.py
          $buildText = Get-Content "scripts/build_raylib_angle.py" -Raw
          $verifyText = Get-Content "scripts/verify_angle_raylib.py" -Raw
          if ($buildText -match '(?m)^\s*-\s+name\s*:|(?m)^\s*jobs\s*:') { throw "scripts/build_raylib_angle.py contains YAML, not Python." }
          if ($verifyText -match 'does not depend on libEGL\.dll') { throw "scripts/verify_angle_raylib.py still has the old broken libEGL direct-import check." }
          if ($buildText -notmatch 'GLFW_ANGLE_PLATFORM_TYPE_D3D11') { throw "scripts/build_raylib_angle.py must patch raylib to request GLFW_ANGLE_PLATFORM_TYPE_D3D11." }
          Write-Host "Repository file validation passed."

      - name: Setup MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Force vcpkg root after MSVC setup
        shell: pwsh
        run: |
          "VCPKG_ROOT=C:\vcpkg" | Add-Content -Path $env:GITHUB_ENV
          "VCPKG_INSTALLATION_ROOT=C:\vcpkg" | Add-Content -Path $env:GITHUB_ENV
          "VCPKG_DEFAULT_TRIPLET=x64-windows" | Add-Content -Path $env:GITHUB_ENV

      - name: Restore vcpkg cache
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\buildtrees
            C:\vcpkg\downloads
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-angle-${{ runner.os }}-x64-windows-chromium-7258-2
          restore-keys: |
            vcpkg-angle-${{ runner.os }}-x64-windows-
            vcpkg-angle-${{ runner.os }}-

      - name: Install ANGLE from vcpkg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path C:\vcpkg\vcpkg.exe)) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          C:\vcpkg\vcpkg.exe install angle:x64-windows --vcpkg-root C:\vcpkg

      - name: Save vcpkg cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\buildtrees
            C:\vcpkg\downloads
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-angle-${{ runner.os }}-x64-windows-chromium-7258-2

      - name: Build raylib ANGLE Direct3D11 native DLL
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.raylib_ref }}"
          if ([string]::IsNullOrWhiteSpace($ref)) { $ref = "6.0" }
          python scripts/build_raylib_angle.py --raylib-ref $ref --vcpkg-root C:\vcpkg --triplet x64-windows

      - name: Verify native raylib ANGLE output
        shell: pwsh
        run: python scripts/verify_angle_raylib.py

      - name: Copy native DLLs into sample project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/RaylibAngleSample/native/win-x64 | Out-Null
          Copy-Item artifacts/raylib-angle-win-x64/* src/RaylibAngleSample/native/win-x64/ -Force

      - name: Publish C# sample
        shell: pwsh
        run: |
          dotnet restore src/RaylibAngleSample/RaylibAngleSample.csproj
          dotnet publish src/RaylibAngleSample/RaylibAngleSample.csproj -c Release -r win-x64 --self-contained false -o artifacts/RaylibAngleSample

      - name: Verify sample output contains ANGLE files
        shell: pwsh
        run: |
          $sampleOut = "artifacts/RaylibAngleSample"
          foreach ($file in "raylib.dll", "libEGL.dll", "libGLESv2.dll") {
            if (-not (Test-Path (Join-Path $sampleOut $file))) { throw "Missing $file in sample output: $sampleOut" }
          }
          Get-ChildItem $sampleOut | Format-Table Name, Length

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item artifacts/raylib-angle-win-x64 package/native -Recurse -Force
          Copy-Item artifacts/RaylibAngleSample package/RaylibAngleSample -Recurse -Force
          if (Test-Path README.md) { Copy-Item README.md package/README.md -Force }
          Compress-Archive -Path package/* -DestinationPath raylib-angle-direct3d11-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raylib-angle-direct3d11-win-x64
          path: raylib-angle-direct3d11-win-x64.zip
